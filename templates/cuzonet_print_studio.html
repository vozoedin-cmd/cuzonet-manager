<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CuzoNet Print Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root { --brand-color: #ff6600; --neon-glow: 0 0 15px rgba(255, 102, 0, 0.4); }
        .print-wrapper { font-family: 'Inter', sans-serif; }
        .control-panel { background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(15px); padding: 35px; border-radius: var(--radius-lg); box-shadow: 0 10px 30px rgba(0,0,0,0.8), var(--neon-glow); max-width: 800px; margin: 40px auto; border: 1px solid rgba(255, 102, 0, 0.3); color: #fff; }
        .control-panel textarea { width: 100%; height: 120px; padding: 15px; border-radius: 8px; border: 1px solid rgba(255, 102, 0, 0.3); background: rgba(0,0,0,0.4); color: #fff; font-family: monospace; resize: vertical; margin-bottom: 25px; box-sizing: border-box; font-size: 16px; font-weight: bold; transition: all 0.3s; }
        .control-panel .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .control-panel .input-group { text-align: left; }
        .control-panel .input-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #ffaa00; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .control-panel .input-group input, .control-panel .input-group select { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid rgba(255, 102, 0, 0.3); background: rgba(0,0,0,0.4); color: #fff; box-sizing: border-box; font-family: 'Inter'; font-weight: 600; transition: all 0.3s; }
        .control-panel textarea:focus, .control-panel .input-group input:focus, .control-panel .input-group select:focus { border-color: #ffaa00; box-shadow: 0 0 10px rgba(255, 102, 0, 0.5); outline: none; }
        .control-panel #colorPicker { height: 50px; padding: 5px; cursor: pointer; background: transparent; border: none; }
        .control-panel .btn-print { background: linear-gradient(90deg, #ff6600, #e63900); color: white; border: none; padding: 18px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4); text-transform: uppercase; letter-spacing: 1px; }
        .control-panel .btn-print:hover { background: linear-gradient(90deg, #ffaa00, #ff6600); transform: scale(1.02); box-shadow: 0 6px 20px rgba(255, 102, 0, 0.7); }
        
        #print-area { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 0 auto; max-width: 21cm; }
        .v-card { background: white; width: 2.6cm; height: auto; border: 1.5px solid var(--brand-color); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; break-inside: avoid; page-break-inside: avoid; }
        .v-header { font-size: 0.45rem; font-weight: 900; text-align: center; color: black; padding: 3px 0; border-bottom: 1px solid var(--brand-color); }
        .v-creds { padding: 4px; display: flex; flex-direction: column; gap: 2px; }
        .v-row { display: flex; justify-content: center; align-items: center; margin: 2px 0; }
        .v-lbl { font-size: 0.4rem; font-weight: 700; color: #64748b; margin-right: 4px; }
        .v-val { font-size: 0.75rem; font-weight: 900; color: black; letter-spacing: 0.5px; }
        .v-price-box { background-color: var(--brand-color); color: white; text-align: center; padding: 4px 0; margin: 0 3px; border-radius: 4px; }
        .v-price { font-size: 0.7rem; font-weight: 900; }
        .v-time { font-size: 0.4rem; font-weight: 700; text-transform: uppercase; margin-top: 1px; }
        .v-footer { font-size: 0.4rem; font-weight: 900; text-align: center; color: black; padding: 3px 0; margin-top: auto; }
        
        
        .v-header-logo { max-width: 100%; max-height: 12px; display: block; margin: 0 auto; object-fit: contain; }

        /* Plantilla Premium */
        .v-card.premium { border: 2px solid #d4af37; background: linear-gradient(135deg, #fff, #fdfbf1); box-shadow: 0 2px 5px rgba(212,175,55,0.2); }
        .v-card.premium .v-header { border-bottom: 1px solid #d4af37; color: #d4af37; }
        .v-card.premium .v-price-box { background-color: #d4af37; color: #000; }
        
        /* Plantilla Oscura */
        .v-card.dark { background: #1e1e1e; border: 1.5px solid #444; color: #fff; }
        .v-card.dark .v-header { color: #fff; border-bottom: 1px solid #444; }
        .v-card.dark .v-lbl { color: #aaa; }
        .v-card.dark .v-val { color: var(--brand-color); }
        .v-card.dark .v-footer { color: #888; }
        
        @media print {
            @page { margin: 10mm; }
            body { padding: 0; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .control-panel, .sidebar, .header, .bg-animation, #cuzobot-container, #toastContainer, .toast { display: none !important; }
            .main-content { margin-left: 0 !important; padding: 0 !important; }
            #print-area { width: 100%; max-width: none; }
        }

        /* PRO Modal Styles */
        .pro-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; display: inline-block; text-align: center; min-width: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .badge-green { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.5); text-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
        .badge-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.5); text-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
        .badge-orange { background: rgba(255, 102, 0, 0.15); color: #ffaa00; border: 1px solid rgba(255, 102, 0, 0.5); text-shadow: 0 0 8px rgba(255, 102, 0, 0.5); }
        
        .pro-progress-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; width: 100%; margin-top: 6px; overflow: hidden; position: relative; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .pro-progress-fill { background: linear-gradient(90deg, #10b981, #ef4444); height: 100%; border-radius: 3px; transition: width 0.5s ease-out; }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(255, 102, 0, 0.4); border-color: rgba(255, 102, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 102, 0, 0.9); border-color: #ffaa00; }
            100% { box-shadow: 0 0 10px rgba(255, 102, 0, 0.4); border-color: rgba(255, 102, 0, 0.5); }
        }
        .master-total-box { animation: pulse-glow 2.5s infinite; background: linear-gradient(135deg, rgba(20,20,25,0.95), rgba(40,15,5,0.95)); backdrop-filter: blur(10px); padding: 20px 25px; border-radius: 16px; margin-top: 25px; display: flex; justify-content: space-between; align-items: center; border: 2px solid #ff6600; position: relative; overflow: hidden; }
        .master-total-box::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,102,0,0.1) 0%, transparent 60%); z-index: 0; pointer-events: none; }
        .master-total-content { position: relative; z-index: 1; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-modal-action { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 0.9rem; font-family: 'Inter'; font-weight: 600; }
        .btn-modal-action:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); border-color: #ffaa00; color: #ffaa00; }

        /* Modal Estadisticas PRO */
        .stats-modal-pro { background: linear-gradient(160deg, rgba(22, 22, 28, 0.98), rgba(30, 18, 10, 0.98)); border: 1px solid rgba(255, 102, 0, 0.6); border-radius: 16px; padding: 22px 28px; width: calc(100vw - 30px); height: calc(100vh - 30px); color: #fff; box-shadow: 0 0 50px rgba(255, 102, 0, 0.35), 0 25px 60px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
        .stats-modal-header { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 18px; border-bottom: 1px solid rgba(255,102,0,0.3); padding-bottom: 14px; flex-wrap: wrap; }
        .stats-search { flex: 1; min-width: 200px; max-width: 380px; padding: 9px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.4); color: #fff; font-family: 'Inter'; font-size: 0.9rem; outline: none; transition: all 0.3s; }
        .stats-search:focus { border-color: #ffaa00; box-shadow: 0 0 12px rgba(255, 170, 0, 0.3); }

        .stats-kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 18px; }
        .stats-kpi { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px 18px; position: relative; overflow: hidden; }
        .stats-kpi::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--kpi-color, #ffaa00); box-shadow: 0 0 12px var(--kpi-color, #ffaa00); }
        .stats-kpi .kpi-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .stats-kpi .kpi-value { font-size: 1.45rem; font-weight: 900; color: #fff; }
        .stats-kpi .kpi-sub { font-size: 0.75rem; color: #888; margin-top: 2px; }

        .vendor-section { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 14px 18px; margin-bottom: 12px; transition: border-color 0.2s; }
        .vendor-section:hover { border-color: rgba(255,102,0,0.35); }
        .vendor-title { display: flex; justify-content: space-between; align-items: center; margin: 0; cursor: pointer; user-select: none; flex-wrap: wrap; gap: 10px; padding: 2px 0; }
        .vendor-title h4 { margin: 0; color: #fff; font-size: 1.05rem; display: flex; align-items: center; }
        .vendor-title .vendor-chips { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; }
        .vendor-chevron { font-size: 0.85rem; color: #ffaa00; transition: transform 0.2s ease; width: 14px; }
        .vendor-body { margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,102,0,0.3); }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .stats-table thead th { padding: 9px 10px; color: #ffaa00; text-align: left; background: rgba(30, 22, 15, 0.98); position: sticky; top: 0; z-index: 2; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,102,0,0.3); }
        .stats-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.06); transition: background 0.15s; }
        .stats-table tbody tr:hover { background: rgba(255, 102, 0, 0.07); }
        .stats-table td { padding: 9px 10px; }
        .subtotal-row { background: rgba(255,102,0,0.12) !important; }
        .subtotal-row td { font-weight: 800; }

        @media (max-width: 900px) {
            .stats-modal-pro { padding: 15px; }
            .stats-modal-header { gap: 10px; }
            .stats-search { max-width: 100%; order: 3; }
        }

        /* Modal Codigos del Lote PRO */
        .codes-modal-pro { background: linear-gradient(160deg, rgba(20, 26, 24, 0.98), rgba(10, 28, 22, 0.98)); border: 1px solid rgba(3, 167, 134, 0.6); border-radius: 16px; padding: 22px 28px; width: calc(100vw - 30px); height: calc(100vh - 30px); color: #fff; box-shadow: 0 0 50px rgba(3, 167, 134, 0.3), 0 25px 60px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
        .codes-modal-header { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid rgba(3, 167, 134, 0.3); padding-bottom: 12px; flex-wrap: wrap; }
        .codes-modal-header .stats-search:focus { border-color: #03a786; box-shadow: 0 0 12px rgba(3, 167, 134, 0.3); }

        .codes-filter-btn { flex: 1; background: rgba(255,255,255,0.04); color: #ccc; border: 1px solid rgba(255,255,255,0.15); padding: 9px 12px; border-radius: 8px; cursor: pointer; transition: all 0.25s; font-family: 'Inter'; font-weight: 700; font-size: 0.88rem; }
        .codes-filter-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.09); }
        .codes-filter-btn.f-activo { color: #10b981; border-color: rgba(16, 185, 129, 0.4); }
        .codes-filter-btn.f-usado { color: #ffaa00; border-color: rgba(255, 170, 0, 0.4); }
        .codes-filter-btn.f-vencido { color: #94a3b8; border-color: rgba(148, 163, 184, 0.4); }
        .codes-filter-btn.filtro-activo { background: rgba(3, 167, 134, 0.18); border-color: #03a786; color: #fff; box-shadow: 0 0 12px rgba(3, 167, 134, 0.35); }

        .codes-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .codes-table thead th { padding: 9px 10px; color: #03a786; text-align: left; background: rgba(14, 26, 22, 0.98); position: sticky; top: 0; z-index: 2; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(3, 167, 134, 0.35); }
        .codes-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.06); transition: background 0.15s; }
        .codes-table tbody tr:hover { background: rgba(3, 167, 134, 0.08); }
        .codes-table td { padding: 8px 10px; }
        .badge-gray { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.5); }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cuzonet_print_studio.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cuzonet_print_studio_refinements.css') }}">
</head>
<body>
    <div class="bg-animation">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
    </div>

    {% include 'sidebar.html' %}

    <main class="main-content">
        <div class="print-wrapper">
            {% include '_cuzonet_print_studio_panel.html' %}
            <div id="print-area"></div>
        </div>
    </main>

    <!-- Modal Estadísticas de Vendedores -->
    <div class="modal-overlay" id="statsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(8px);">
        <div class="modal-content stats-modal-pro">
            <div class="stats-modal-header">
                <h3 style="margin: 0; color: #ffaa00; white-space: nowrap;"><i class="fas fa-chart-pie"></i> Estadísticas por Plan / Lote</h3>
                <input type="text" id="statsSearch" class="stats-search" placeholder="&#128269; Filtrar por vendedor o plan..." oninput="renderStats(window.__statsData, this.value)">
                <div style="display:flex; gap:8px;">
                    <button class="btn-modal-action" onclick="expandirColapsarTodos(true)" style="padding: 8px 12px; font-size:0.8rem;"><i class="fas fa-angles-down"></i> Expandir todos</button>
                    <button class="btn-modal-action" onclick="expandirColapsarTodos(false)" style="padding: 8px 12px; font-size:0.8rem;"><i class="fas fa-angles-up"></i> Colapsar todos</button>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button id="btnSyncOmada" class="btn-modal-action" onclick="sincronizarOmada()" style="border-color: #03a786; color: #03a786;"><i class="fas fa-sync-alt"></i> Sincronizar Omada</button>
                    <button class="btn-modal-action" onclick="imprimirStats()"><i class="fas fa-print"></i> Imprimir Reporte</button>
                    <button onclick="document.getElementById('statsModal').style.display='none'" class="close-btn" style="background: none; border: none; color: #fff; font-size: 1.6rem; cursor: pointer; line-height: 1;">&times;</button>
                </div>
            </div>
            <div id="statsKpis"></div>
            <div id="statsContent" style="min-height: 150px; flex: 1; overflow-y: auto; padding-right: 8px;">
                <div style="text-align: center; margin-top: 50px;"><i class="fas fa-spinner fa-spin fa-2x text-warning"></i></div>
            </div>
        </div>
    </div>

    <!-- Modal Ver Códigos -->
    <div class="modal-overlay" id="codesModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div class="modal-content codes-modal-pro">
            <div class="codes-modal-header">
                <h3 style="margin: 0; color: #03a786; white-space: nowrap;"><i class="fas fa-list-ol"></i> Códigos del Lote <span id="codesLoteNombre" style="color: #fff; font-weight: 700;"></span></h3>
                <input type="text" id="codesSearch" class="stats-search" style="max-width: 260px;" placeholder="&#128269; Buscar PIN..." oninput="renderCodigos()">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button onclick="copiarCodigos()" class="btn-modal-action" style="border-color: #ffaa00; color: #ffaa00;"><i class="fas fa-copy"></i> Copiar PINs</button>
                    <button onclick="eliminarLoteCompleto()" class="btn-modal-action" style="border-color: #e63946; color: #e63946;"><i class="fas fa-trash-alt"></i> Eliminar Todo el Lote</button>
                    <button onclick="document.getElementById('codesModal').style.display='none'" class="close-btn" style="background: none; border: none; color: #fff; font-size: 1.6rem; cursor: pointer; line-height: 1;">&times;</button>
                </div>
            </div>

            <!-- Controles y Filtros -->
            <div id="codesFilters" style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button id="codesFiltro-todos" onclick="filtrarCodigos('todos')" class="codes-filter-btn">Todos</button>
                <button id="codesFiltro-activo" onclick="filtrarCodigos('activo')" class="codes-filter-btn f-activo">Activos</button>
                <button id="codesFiltro-usado" onclick="filtrarCodigos('usado')" class="codes-filter-btn f-usado">Usados</button>
                <button id="codesFiltro-vencido" onclick="filtrarCodigos('vencido')" class="codes-filter-btn f-vencido">Vencidos</button>
            </div>

            <div id="codesContent" style="flex: 1; overflow-y: auto; padding-right: 8px;">
                <div style="text-align: center; margin-top: 50px;"><i class="fas fa-spinner fa-spin fa-2x" style="color: #03a786;"></i></div>
            </div>
        </div>
    </div>

    <script>

        window.logoBase64 = localStorage.getItem('omadaLogo') || null;

        document.addEventListener('DOMContentLoaded', () => {
            cargarConfigStudio();
            syncPrintFields();
            if(window.logoBase64) {
                document.getElementById('btnRemoveLogo').style.display = 'block';
            }
        });
        
        function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                // Resize image to max 200px width
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max = 200;
                    if (width > max) { height *= max / width; width = max; }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const resized = canvas.toDataURL('image/png', 0.8);
                    
                    window.logoBase64 = resized;
                    localStorage.setItem('omadaLogo', resized);
                    document.getElementById('btnRemoveLogo').style.display = 'block';
                    if(typeof showToast !== 'undefined') showToast("Logo guardado", "success");
                    renderLivePreview();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function removeLogo() {
            window.logoBase64 = null;
            localStorage.removeItem('omadaLogo');
            document.getElementById('btnRemoveLogo').style.display = 'none';
            document.getElementById('logoUpload').value = '';
            if(typeof showToast !== 'undefined') showToast("Logo eliminado", "info");
            renderLivePreview();
        }

        function syncPrintFields() {
            const precio = parseFloat(document.getElementById('genPrecio').value || 0).toFixed(2);
            document.getElementById('priceInput').value = `Q ${precio}`;

            const tiempo = document.getElementById('genTimeVal').value || 0;
            const unidadVal = document.getElementById('genTimeUnidad').value;
            const tText = unidadVal == 0 ? 'MINUTOS' : (unidadVal == 1 ? 'HORAS' : 'DIAS');
            document.getElementById('timeInput').value = `${tiempo} ${tText}`;
            guardarConfigStudio();
        }

        // --- RECORDAR CONFIGURACION DEL LOTE (duración, precio, plantilla, color, negocio) ---
        const STUDIO_CONFIG_KEY = 'cuzonet_studio_config';
        const STUDIO_CONFIG_FIELDS = ['genTimeVal', 'genTimeUnidad', 'genPrecio', 'templateSelector', 'colorPicker', 'businessName'];

        function guardarConfigStudio() {
            const config = {};
            STUDIO_CONFIG_FIELDS.forEach(id => {
                const el = document.getElementById(id);
                if (el) config[id] = el.value;
            });
            localStorage.setItem(STUDIO_CONFIG_KEY, JSON.stringify(config));
        }

        function cargarConfigStudio() {
            const raw = localStorage.getItem(STUDIO_CONFIG_KEY);
            if (!raw) return;
            try {
                const config = JSON.parse(raw);
                STUDIO_CONFIG_FIELDS.forEach(id => {
                    if (config[id] !== undefined && config[id] !== '') {
                        const el = document.getElementById(id);
                        if (el) el.value = config[id];
                    }
                });
            } catch (e) { /* config guardada inválida, se ignora */ }
        }

        async function cargarSitiosPrint() {
            const omadaSelect = document.getElementById('genOmada');
            const siteSelect = document.getElementById('genOmadaSite');
            const omada_id = omadaSelect.value;
            
            siteSelect.innerHTML = '<option value="">-- Automático (Sitio por Defecto) --</option>';
            if (!omada_id) return;
            
            // Mostrar estado de carga
            siteSelect.innerHTML = '<option value="">Cargando sitios...</option>';
            siteSelect.disabled = true;
            
            try {
                const r = await fetch('/api/omada/' + omada_id + '/sites');
                const res = await r.json();
                
                siteSelect.innerHTML = '<option value="">-- Automático (Sitio por Defecto) --</option>';
                if (res.success && res.sites.length > 0) {
                    const defaultSite = omadaSelect.options[omadaSelect.selectedIndex].getAttribute('data-default-site');
                    res.sites.forEach(site => {
                        const opt = document.createElement('option');

            const btn = document.getElementById('btnAutoGenerate');
            const oldHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generando en Omada...';
            btn.disabled = true;
            
            try {
                const omada_id = document.getElementById('genOmada').value;
                if(!omada_id) {
                    typeof showToast !== 'undefined' ? showToast('Debes configurar y seleccionar un Controlador Omada', 'error') : alert('Falta Omada');
                    return;
                }
                const cantidad = document.getElementById('genAmount').value;
                const tiempo = document.getElementById('genTimeVal').value;
                const unidad = document.getElementById('genTimeUnidad').value;
                const vendedor_id = document.getElementById('genVendedor').value;
                if(!vendedor_id) {
                    typeof showToast !== 'undefined' ? showToast('DEBES seleccionar a un Vendedor responsable.', 'error') : alert('Debes seleccionar a un Vendedor');

                    btn.disabled = false;
                    return;
                }
                const precio = document.getElementById('genPrecio').value;
                const site_name = document.getElementById('genOmadaSite').value;
                const comentario = document.getElementById('genComentario').value;
                
                const r = await fetch('/api/omada/generar', {

                });

                if(res.success && res.pines) {

                    document.getElementById('codesInput').value = res.pines.join('\n');
                    
                    // Llenar datos visuales
                    const tText = unidad == 0 ? 'MINUTOS' : (unidad == 1 ? 'HORAS' : 'DIAS');

                    // Iniciar renderizado automáticamente
                    setTimeout(() => iniciarProceso(false), 500);

                }
            } catch(e) {
                typeof showToast !== 'undefined' ? showToast('Error de red al conectar con el servidor', 'error') : alert('Error de red');
            } finally {
                btn.innerHTML = oldHtml;
                btn.disabled = false;
            }
        }

        async function sincronizarOmada() {
            const btn = document.getElementById('btnSyncOmada');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sincronizando...';
            btn.disabled = true;

            try {
                const r = await fetch('/api/omada/sync', { method: 'POST' });
                const res = await r.json();
                if (!res.success) {
                    showToast(res.error || 'Error al sincronizar', 'error');
                    return;
                }

                // El sync corre en segundo plano: consultar el estado hasta que termine
                showToast(res.message, 'success');
                for (let i = 0; i < 100; i++) {
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    const rs = await fetch('/api/omada/sync/status');
                    const st = await rs.json();
                    if (!st.running) {
                        showToast(st.message || 'Sincronización finalizada', st.sync_success ? 'success' : 'error');
                        abrirStatsVendedores();
                        return;
                    }
                }
                showToast('La sincronización sigue en progreso. Vuelve a abrir las estadísticas en unos minutos.', 'success');
            } catch (e) {
                showToast('Error de red al sincronizar', 'error');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

            const q = (filtro || '').toLowerCase().trim();

            // KPIs globales (siempre sobre TODOS los datos, sin filtro)

            let html = '';

                        <td style="text-align:center;">
                            <button class="btn-modal-action" onclick="abrirDetalleCodigos('${btoa(JSON.stringify(l.raw_data))}')" style="padding: 4px 10px; font-size: 0.8rem;">
                                <i class="fas fa-eye"></i> Ver
                            </button>

                    subFichas += l.total_fichas;
                    subDisp += l.disponibles;
                    subVend += l.vendidas;
                    subDinero += l.total_dinero;
                    subRecaudado += recaudado;
                });

                const vendorId = 'v_' + btoa(unescape(encodeURIComponent(vendedor))).replace(/[^a-zA-Z0-9]/g, '');
                // Al buscar por texto de plan (no por nombre de vendedor), se auto-expande
                // para que el resultado sea visible de inmediato.

                    <div id="body-${vendorId}" class="vendor-body" style="display:${isExpanded ? 'block' : 'none'};">
                        <table class="stats-table">
                            <thead><tr>
                                <th>Plan / Lote</th>
                                <th style="text-align:center;">Disponibles</th>
                                <th style="text-align:center;">Vendidas</th>
                                <th style="text-align:center;">Total Generadas</th>
                                <th style="text-align:right;">Recaudado (Q)</th>
                                <th style="text-align:right;">Deuda Total (Q)</th>
                                <th style="text-align:center;">Acciones</th>
                            </tr></thead>
                            <tbody>
                                ${filas}
                                <tr class="subtotal-row">
                                    <td style="color:#fff;">Subtotal ${vendedor.split(' ')[0]}</td>
                                    <td colspan="2"></td>
                                    <td style="text-align:center; color:#fff;">${subFichas}</td>
                                    <td style="text-align:right; color:#22d3ee;">Q ${subRecaudado.toFixed(2)}</td>
                                    <td style="text-align:right; color:#ffaa00;">Q ${subDinero.toFixed(2)}</td>
                                    <td></td>

                            </tbody>

                    </div>

                granTotalFichas += subFichas;
                granTotalDinero += subDinero;
            }

            if (!hayResultados) {
                content.innerHTML = `<p style="text-align:center; color:#aaa; margin-top: 30px;"><i class="fas fa-search"></i> Sin resultados para "<b>${filtro}</b>"</p>`;
                return;
            }

            html += `<div class="master-total-box">
                <div class="master-total-content">
                    <span style="font-weight:900; font-size: 1.2rem; color:#fff; letter-spacing: 1px;"><i class="fas fa-coins" style="color:#ffaa00; margin-right:8px;"></i>TOTAL GENERAL MASTER</span>
                    <div style="text-align: right;">
                        <span style="display: block; font-size: 0.95rem; color: #ccc;">Fichas Totales: <b>${granTotalFichas.toLocaleString()}</b></span>
                        <span style="font-weight:900; font-size: 1.5rem; color:#ffaa00; text-shadow: 0 0 10px rgba(255,170,0,0.5);">Q ${granTotalDinero.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>

        function iniciarProceso(exportPDF = false) {
            let textoFresco = document.getElementById('codesInput').value;
            const businessName = document.getElementById('businessName').value || 'WIFI';
            const templateStr = document.getElementById('templateSelector').value;
            const timeStr = document.getElementById('timeInput').value || '-';
            const priceStr = document.getElementById('priceInput').value || '-';
            const printArea = document.getElementById('print-area');
            
            // 1. LIMPIEZA INICIAL DE TEXTO
            // Ya no concatenamos saltos de línea porque estaba uniendo los días ("11") con el PIN ("738889")
            // textoFresco = textoFresco.replace(/(\d+)\s*\n\s*(\d+)/g, '$1$2');
            
            // 2. EXTRACCIÓN Y LIMPIEZA
            const encontradosFrescos = textoFresco.match(/\d{6,12}/g); // PINs de al menos 6 dígitos para ignorar años (2026)
            if(!encontradosFrescos || encontradosFrescos.length === 0) { 
                typeof showToast !== 'undefined' ? showToast("Por favor, pega los códigos de Omada.", "warning") : alert("Por favor, pega los códigos.");
                return; 
            }
            const pingsFinales = [...new Set(encontradosFrescos)];

            // 3. NOMBRE DE ARCHIVO DINÁMICO (Seguro)
            document.title = `Vouchers_${businessName.replace(/\s+/g, '_')}_${priceStr}_${timeStr}_${pingsFinales.length}`.replace(/[\/\?%*:|"<>\.\s]/g, '-');

            // 4. RENDERIZADO
            printArea.innerHTML = '';
            pingsFinales.forEach((code, index) => {
                const card = document.createElement('div');
                card.className = `v-card ${templateStr}`;
                card.innerHTML = `
                    <div class="v-header">${window.logoBase64 ? '<img src="' + window.logoBase64 + '" class="v-header-logo">' : '<i class="fas fa-wifi" style="margin-right:3px; font-size:0.4rem;"></i> ' + businessName}</div>
                    <div class="v-creds"><div class="v-row"><span class="v-lbl">PIN:</span><span class="v-val">${code}</span></div></div>
                    <div class="v-price-box"><div class="v-price">${priceStr}</div><div class="v-time">DURACIÓN: ${timeStr}</div></div>
                    <div class="v-footer">Ficha: #${index + 1}</div>
                `;
                printArea.appendChild(card);
            });
            
            if (exportPDF) {
                typeof showToast !== 'undefined' ? showToast("Generando PDF... por favor espera.", "info") : null;
                const opt = {
                    margin:       10,
                    filename:     document.title + '.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2 },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(printArea).save();
            } else {
                setTimeout(() => { window.print(); }, 500);
            }
        }
        
        // --- LOGICA DEL MODAL DE CODIGOS ---
        let codigosActuales = [];

        async function abrirDetalleCodigos(rawDataB64) {
            const rawData = JSON.parse(atob(rawDataB64));
            document.getElementById('codesModal').style.display = 'flex';
            document.getElementById('codesLoteNombre').textContent = rawData.lote ? `· ${rawData.lote}` : '';
            document.getElementById('codesSearch').value = '';
            filtroActual = 'todos';
            const content = document.getElementById('codesContent');
            content.innerHTML = '<div style="text-align: center; margin-top: 50px;"><i class="fas fa-spinner fa-spin fa-2x" style="color: #03a786;"></i><br><span style="color:#03a786;">Cargando...</span></div>';

            try {
                const r = await fetch('/api/omada/ver_codigos', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(rawData)
                });
                const res = await r.json();

                if (res.success) {
                    codigosActuales = res.vouchers;
                    renderCodigos();
                } else {
                    content.innerHTML = `<div style="color: #e63946; text-align: center;">Error: ${res.error}</div>`;
                }
            } catch (e) {
                content.innerHTML = '<div style="color: #e63946; text-align: center;">Error de red.</div>';
            }

        function codigosFiltrados() {
            const q = (document.getElementById('codesSearch').value || '').trim();
            let filtrados = codigosActuales;
            if (filtroActual !== 'todos') {
                filtrados = filtrados.filter(c => c.estado === filtroActual);
            }
            if (q) {
                filtrados = filtrados.filter(c => c.codigo.includes(q));
            }
            return filtrados;
        }

        function renderCodigos() {
            const content = document.getElementById('codesContent');

            // Contadores en los botones de filtro
            const counts = { todos: codigosActuales.length, activo: 0, usado: 0, vencido: 0 };
            codigosActuales.forEach(c => { if (counts[c.estado] !== undefined) counts[c.estado]++; });
            const labels = { todos: 'Todos', activo: 'Activos', usado: 'Usados', vencido: 'Vencidos' };
            for (const key of Object.keys(labels)) {
                const btn = document.getElementById('codesFiltro-' + key);
                if (btn) {
                    btn.innerHTML = `${labels[key]} <span style="opacity:0.75; font-weight:800;">(${counts[key]})</span>`;
                    btn.classList.toggle('filtro-activo', filtroActual === key);
                }
            }

            const filtrados = codigosFiltrados();
            if (filtrados.length === 0) {
                content.innerHTML = '<div style="text-align:center; color:#aaa; margin-top: 30px;"><i class="fas fa-search"></i> No hay códigos para este filtro.</div>';
                return;
            }

            let html = '<table class="codes-table"><thead><tr>';
            html += '<th>Código PIN</th><th>Estado</th><th>Creada</th><th>Fecha de Uso</th><th style="text-align:center;">Acción</th>';
            html += '</tr></thead><tbody>';

            filtrados.forEach(c => {
                let badgeClass = 'badge-green';
                let estadoStr = 'Activo';
                if (c.estado === 'usado') { badgeClass = 'badge-red'; estadoStr = 'Usado'; }
                else if (c.estado === 'vencido') { badgeClass = 'badge-gray'; estadoStr = 'Vencido'; }

                html += `<tr>
                    <td style="font-weight:bold; color: #fff; font-family: monospace; font-size: 1.05rem; letter-spacing: 2px;">${c.codigo}</td>
                    <td><span class="pro-badge ${badgeClass}">${estadoStr}</span></td>
                    <td style="color: #999; font-size: 0.8rem;">${c.fecha_creacion || '-'}</td>
                    <td style="color: #ccc; font-size: 0.8rem;">${c.fecha_uso || '-'}</td>
                    <td style="text-align:center;">
                        <button onclick="eliminarFicha(${c.id})" style="background:none; border:none; color:#e63946; cursor:pointer;" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            html += `<div style="text-align:right; color:#888; font-size: 0.8rem; padding: 10px 5px;">Mostrando ${filtrados.length} de ${codigosActuales.length} códigos</div>`;
            content.innerHTML = html;
        }

        function filtrarCodigos(estado) {
            filtroActual = estado;
            renderCodigos();
        }

        function copiarCodigos() {
            const filtrados = codigosFiltrados();
            const texto = filtrados.map(c => c.codigo).join('\\n');
            navigator.clipboard.writeText(texto).then(() => {
                showToast(`Se copiaron ${filtrados.length} PINs al portapapeles.`, 'success');
            });
        }
        
        async function eliminarFicha(id) {

            await ejecutarEliminacion([id]);

        async function eliminarLoteCompleto() {
            if (codigosActuales.length === 0) return;
            if (!confirm(`¿Seguro que quieres borrar las ${codigosActuales.length} fichas de este lote en Cuzonet? RECUERDA: También debes borrarlas en tu panel Omada.`)) return;
            const ids = codigosActuales.map(c => c.id);
            await ejecutarEliminacion(ids);

        async function ejecutarEliminacion(ids) {

                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ids: ids})
                });

        // --- LOGICA DE MEJORAS UX ---
        function calcularEstadisticasRapidas() {
            const cantidad = parseInt(document.getElementById('genAmount').value) || 0;
            const precio = parseFloat(document.getElementById('genPrecio').value) || 0;
            const selectVendedor = document.getElementById('genVendedor');
            
            const ventaTotal = cantidad * precio;
            let ganancia = 0;
            
            document.getElementById('stat_cantidad').textContent = cantidad;
            document.getElementById('stat_venta').textContent = `Q ${ventaTotal.toFixed(2)}`;
            
            if (selectVendedor.selectedIndex > 0) {
                const opt = selectVendedor.options[selectVendedor.selectedIndex];
                const tipo = opt.getAttribute('data-tipo');
                const valor = parseFloat(opt.getAttribute('data-valor')) || 0;
                
                if (tipo === 'porcentaje') {
                    ganancia = ventaTotal * (valor / 100);
                } else {
                    ganancia = cantidad * valor;
                }
            }
            
            document.getElementById('stat_ganancia').textContent = `Q ${ganancia.toFixed(2)}`;
            
            // Show Extended Vendor Info
            if (selectVendedor.selectedIndex > 0) {
                const opt = selectVendedor.options[selectVendedor.selectedIndex];
                document.getElementById('ve_ventas').textContent = `Q ${parseFloat(opt.getAttribute('data-ventas')).toFixed(2)}`;
                document.getElementById('ve_inv').textContent = opt.getAttribute('data-inv');
                document.getElementById('ve_com').textContent = `Q ${parseFloat(opt.getAttribute('data-com')).toFixed(2)}`;
                document.getElementById('vendorExtendedInfo').style.display = 'flex';
            } else {
                document.getElementById('vendorExtendedInfo').style.display = 'none';
            }
        }
        
        function filtrarVendedores() {
            const query = document.getElementById('searchVendedor').value.toLowerCase();
            const select = document.getElementById('genVendedor');
            for (let i = 1; i < select.options.length; i++) { // Skip placeholder
                const text = select.options[i].text.toLowerCase();
                select.options[i].style.display = text.includes(query) ? '' : 'none';
            }
        }
        
        function generarReferencia() {
            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth()+1).toString().padStart(2,'0');
            const day = now.getDate().toString().padStart(2,'0');
            const random = Math.floor(Math.random()*9000 + 1000); // 1000-9999
            const ref = `REGI-${year}${month}${day}-${random}`;
            document.getElementById('genComentario').value = ref;
            if(typeof showCustomToast !== 'undefined') showCustomToast("Referencia generada: " + ref, "info");
        }
        
        function limpiarFormulario() {
            if(confirm('¿Seguro que deseas reiniciar todo el formulario?')) {
                document.getElementById('genAmount').value = '50';
                document.getElementById('genTimeVal').value = '3';
                document.getElementById('genTimeUnidad').value = '1';
                document.getElementById('genPrecio').value = '3.00';
                document.getElementById('genComentario').value = '';
                document.getElementById('codesInput').value = '';
                document.getElementById('print-area').innerHTML = '';
                document.getElementById('searchVendedor').value = '';
                document.getElementById('genVendedor').selectedIndex = 0;
                document.getElementById('businessName').value = 'CUZONET';
                document.getElementById('templateSelector').value = 'classic';
                document.getElementById('colorPicker').value = '#ff6600';
                localStorage.removeItem(STUDIO_CONFIG_KEY);
                filtrarVendedores();
                syncPrintFields();
                calcularEstadisticasRapidas();
                renderLivePreview();
                updateColor(document.getElementById('colorPicker').value);
            }
        }
        
        function compartirWhatsApp() {
            const textoFresco = document.getElementById('codesInput').value;
            const encontrados = textoFresco.match(/\d{6,12}/g);
            if (!encontrados) {
                if(typeof showToast !== 'undefined') showToast("No hay códigos para compartir.", "warning");
                return;
            }
            const codes = [...new Set(encontrados)];
            const time = document.getElementById('timeInput').value;
            const val = document.getElementById('priceInput').value;
            
            let msj = `*FICHAS WIFI (${time}) - ${val}*\n\n`;
            codes.forEach(c => msj += `${c}\n`);
            msj += `\n*Generadas:* ${codes.length} fichas`;
            
            const selectVendedor = document.getElementById('genVendedor');
            let phone = '';
            if (selectVendedor && selectVendedor.selectedIndex > 0) {
                const opt = selectVendedor.options[selectVendedor.selectedIndex];
                phone = opt.getAttribute('data-tel') || '';
            }
            
            const encoded = encodeURIComponent(msj);
            let url = `https://wa.me/?text=${encoded}`;
            if (phone) {
                phone = phone.replace(/\D/g, '');
                url = `https://wa.me/${phone}?text=${encoded}`;
                if(typeof showToast !== 'undefined') showToast(`Abriendo chat con el vendedor...`, "info");
            } else {
                if(typeof showToast !== 'undefined') showToast(`El vendedor no tiene teléfono. Abriendo WhatsApp libre.`, "info");
            }
            
            window.open(url, '_blank');
        }
        
        function exportarExcel() {
            const textoFresco = document.getElementById('codesInput').value;
            const encontrados = textoFresco.match(/\d{6,12}/g);
            if (!encontrados) {
                alert("No hay códigos para exportar.");
                return;
            }
            const codes = [...new Set(encontrados)];
            
            let csv = "Código,Estado,Duración,Precio\n";
            codes.forEach(c => {
                csv += `${c},Activo,${document.getElementById('timeInput').value},${document.getElementById('priceInput').value}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `CuzoNet_Lote_${codes.length}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        document.addEventListener('DOMContentLoaded', () => {
            calcularEstadisticasRapidas();
            
            // Simular Ping a la API visualmente
            setTimeout(() => {
                if (document.getElementById('genOmada').options.length > 1) {
                    const apiStat = document.getElementById('stat_api').children[0];
                    apiStat.innerHTML = '<div style="width:10px; height:10px; border-radius:50%; background:#10b981; box-shadow: 0 0 8px #10b981; animation: pulse 2s infinite;"></div> CONECTADO';
                    apiStat.style.color = '#10b981';
                    const ping = Math.floor(Math.random() * 30) + 15;
                    document.getElementById('api_ping').innerText = `Ping: ${ping}ms | Sinc: ${new Date().toLocaleTimeString()}`;
                } else {
                    const apiStat = document.getElementById('stat_api').children[0];
                    apiStat.innerHTML = '<div style="width:10px; height:10px; border-radius:50%; background:#ef4444; box-shadow: 0 0 8px #ef4444;"></div> SIN OMADA';
                    apiStat.style.color = '#ef4444';
                    document.getElementById('api_ping').innerText = 'No configurado';
                }
            }, 1000);
        });

        // Reemplazar autoGenerateVouchers original para añadir barra de progreso
        const originalAutoGenerate = autoGenerateVouchers;
        autoGenerateVouchers = async function() {
            const omada_id = document.getElementById('genOmada').value;
            const vendedor_id = document.getElementById('genVendedor').value;
            if(!omada_id || !vendedor_id) {
                typeof showToast !== 'undefined' ? showToast('Falta Omada o Vendedor.', 'error') : alert('Faltan datos');
                return;
            }
            
            const btn = document.getElementById('btnAutoGenerate');
            btn.disabled = true;
            document.getElementById('genProgressContainer').style.display = 'block';
            document.getElementById('genProgressBar').style.width = '10%';
            document.getElementById('genProgressText').innerText = 'Conectando...';
            
            // Simulamos avance mientras responde la API
            let simProgress = 10;
            const progressInterval = setInterval(() => {
                if (simProgress < 85) {
                    simProgress += 10;
                    document.getElementById('genProgressBar').style.width = simProgress + '%';
                    document.getElementById('genProgressText').innerText = 'Generando: ' + simProgress + '%';
                }
            }, 500);

            await originalAutoGenerate();

            clearInterval(progressInterval);
            document.getElementById('genProgressBar').style.width = '100%';
            document.getElementById('genProgressText').innerText = '¡Listo!';
            
            setTimeout(() => {
                document.getElementById('genProgressContainer').style.display = 'none';
                document.getElementById('genProgressBar').style.width = '0%';
            }, 3000);
        };

        // Custom Toast Notifications
        function showCustomToast(msg, type='info') {
            let container = document.getElementById('toastContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toastContainer';
                container.style.cssText = 'position: fixed; bottom: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px;';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            let color = '#3b82f6';
            let icon = 'fa-info-circle';
            if (type === 'success') { color = '#10b981'; icon = 'fa-check-circle'; }
            if (type === 'error' || type === 'danger') { color = '#ef4444'; icon = 'fa-times-circle'; }
            if (type === 'warning') { color = '#ffaa00'; icon = 'fa-exclamation-triangle'; }
            
            toast.style.background = 'rgba(20, 20, 25, 0.95)';
            toast.style.borderLeft = `4px solid ${color}`;
            toast.style.padding = '15px 20px';
            toast.style.borderRadius = '4px';
            toast.style.color = '#fff';
            toast.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
            toast.style.display = 'flex';
            toast.style.alignItems = 'center';
            toast.style.gap = '10px';
            toast.style.fontSize = '0.9rem';
            toast.style.transform = 'translateX(120%)';
            toast.style.transition = 'all 0.3s ease-out';
            toast.style.zIndex = '999999';
            
            toast.innerHTML = `<i class="fas ${icon}" style="color: ${color}; font-size: 1.2rem;"></i> <span>${msg}</span>`;
            
            container.appendChild(toast);
            
            // Animate in
            setTimeout(() => { toast.style.transform = 'translateX(0)'; }, 10);
            
            // Animate out
            setTimeout(() => {
                toast.style.transform = 'translateX(120%)';
                toast.style.opacity = '0';
                setTimeout(() => { toast.remove(); }, 300);
            }, 3000);
        }
        
        // Override global showToast
        window.showToast = showCustomToast;

        function renderLivePreview() {
            const businessName = document.getElementById('businessName').value || 'CUZONET';
            const templateStr = document.getElementById('templateSelector').value;
            const timeStr = document.getElementById('timeInput').value || '-';
            const priceStr = document.getElementById('priceInput').value || '-';
            const container = document.getElementById('livePreviewContainer');
            if(!container) return;
            
            const color = document.getElementById('colorPicker').value;
            document.documentElement.style.setProperty('--brand-color', color);
            
            container.innerHTML = `
                <div class="v-card ${templateStr}" style="margin:0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <div class="v-header">${window.logoBase64 ? '<img src="' + window.logoBase64 + '" class="v-header-logo">' : '<i class="fas fa-wifi" style="margin-right:3px; font-size:0.4rem;"></i> ' + businessName}</div>
                    <div class="v-creds"><div class="v-row"><span class="v-lbl">PIN:</span><span class="v-val">12345678</span></div></div>
                    <div class="v-price-box"><div class="v-price">${priceStr}</div><div class="v-time">DURACIÓN: ${timeStr}</div></div>
                    <div class="v-footer">Ficha: #1</div>
                </div>
            `;
            guardarConfigStudio();
        }
        
        function exportarTXT() {
            const textoFresco = document.getElementById('codesInput').value;
            const encontrados = textoFresco.match(/\d{6,12}/g);
            if (!encontrados) { showCustomToast("No hay códigos para exportar.", "warning"); return; }
            const codes = [...new Set(encontrados)];
            const time = document.getElementById('timeInput').value;
            const val = document.getElementById('priceInput').value;
            
            let txt = `LOTE WIFI - ${time} - ${val}\n\n`;
            codes.forEach(c => txt += `${c}\n`);
            txt += `\nGeneradas: ${codes.length}`;
            
            const blob = new Blob([txt], { type: 'text/plain;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `CuzoNet_Lote_${codes.length}.txt`;
            link.click();
            showCustomToast("Exportado a TXT", "success");
        }
        
        function exportarJSON() {
            const textoFresco = document.getElementById('codesInput').value;
            const encontrados = textoFresco.match(/\d{6,12}/g);
            if (!encontrados) { showCustomToast("No hay códigos para exportar.", "warning"); return; }
            const codes = [...new Set(encontrados)];
            
            const data = {
                business: document.getElementById('businessName').value,
                duration: document.getElementById('timeInput').value,
                price: document.getElementById('priceInput').value,
                total_codes: codes.length,
                codes: codes
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `CuzoNet_Lote_${codes.length}.json`;
            link.click();
            showCustomToast("Exportado a JSON", "success");
        }
        
        function reimprimirUltimoLote() {
            const lastCodes = localStorage.getItem('cuzonet_last_batch');
            if (lastCodes) {
                document.getElementById('codesInput').value = lastCodes;
                showCustomToast("Último lote recuperado de caché.", "info");
                iniciarProceso(false);
            } else {
                showCustomToast("No hay lote previo en caché.", "warning");
            }
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey) {
                switch(e.key.toLowerCase()) {
                    case 'g':
                        e.preventDefault();
                        document.getElementById('btnAutoGenerate').click();
                        break;
                    case 'p':
                        e.preventDefault();
                        iniciarProceso(false);
                        break;
                    case 'w':
                        e.preventDefault();
                        compartirWhatsApp();
                        break;
                    case 'e':
                        e.preventDefault();
                        iniciarProceso(true);
                        break;
                }
            }
        });
        
        // Cache codes before processing
        const prevIniciarProceso = iniciarProceso;
        iniciarProceso = function(exportPDF = false) {
            const textoFresco = document.getElementById('codesInput').value;
            if(textoFresco.trim().length > 5) {
                localStorage.setItem('cuzonet_last_batch', textoFresco);
            }
            if(exportPDF) {
                showCustomToast("Generando PDF de alta calidad...", "info");
            }
            prevIniciarProceso(exportPDF);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderLivePreview();
        });
    
        async function abrirModalHistorial() {
            document.getElementById('historialModal').style.display = 'flex';
            document.getElementById('historialList').innerHTML = '<div style="text-align:center; padding: 20px;"><i class="fas fa-spinner fa-spin fa-2x" style="color:#ffaa00;"></i></div>';
            try {
                const res = await fetch('/api/omada/historial_lotes').then(r => r.json());
                if(res.success && res.lotes.length > 0) {
                    let html = '<table style="width:100%; border-collapse: collapse; text-align: left;">';
                    html += '<tr style="border-bottom: 1px solid #ff6600; font-size:0.9rem;"><th>Referencia</th><th>Cantidad</th><th>Precio</th><th>Fecha</th><th>Acción</th></tr>';
                    res.lotes.forEach(l => {
                        html += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                            <td style="padding: 12px 10px; font-weight:bold; color:#ffaa00;">${l.lote}</td>
                            <td style="padding: 12px 10px;">${l.cantidad} fichas</td>
                            <td style="padding: 12px 10px;">Q ${parseFloat(l.precio_unitario).toFixed(2)}</td>
                            <td style="padding: 12px 10px; font-size:0.85rem; color:#aaa;">${l.fecha}</td>
                            <td style="padding: 12px 10px;"><button class="btn-modal-action" style="padding:5px 10px;" onclick="cargarLoteHistorial('${l.lote}')"><i class="fas fa-download"></i> Cargar</button></td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById('historialList').innerHTML = html;
                } else {
                    document.getElementById('historialList').innerHTML = '<p>No hay lotes recientes.</p>';
                }
            } catch(e) {
                document.getElementById('historialList').innerHTML = '<p style="color:red;">Error cargando historial</p>';
            }
        }
        
        async function cargarLoteHistorial(loteNombre) {
            document.getElementById('historialModal').style.display = 'none';
            if(typeof showToast !== 'undefined') showToast("Cargando lote: " + loteNombre, "info");
            try {
                const res = await fetch('/api/omada/lote/' + encodeURIComponent(loteNombre)).then(r => r.json());
                if(res.success) {
                    const txt = res.pines.join('\n');
                    document.getElementById('codesInput').value = txt;
                    
                    if(res.duracion && res.unidad !== undefined) {
                        const unidadStr = res.unidad == 0 ? 'MINUTOS' : (res.unidad == 1 ? 'HORAS' : 'DÍAS');
                        document.getElementById('timeInput').value = `${res.duracion} ${unidadStr}`;
                    }
                    if(res.precio !== undefined) {
                        document.getElementById('priceInput').value = `Q ${parseFloat(res.precio).toFixed(2)}`;
                    }
                    renderLivePreview();
                    if(typeof showToast !== 'undefined') showToast(`Se cargaron ${res.pines.length} fichas de la base de datos.`, "success");
                } else {
                    if(typeof showToast !== 'undefined') showToast("Error: " + res.error, "error");
                }
            } catch(e) {
                if(typeof showToast !== 'undefined') showToast("Error de conexión", "error");
            }
        }
</script>
