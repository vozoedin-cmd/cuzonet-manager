<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CuzoNet Print Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root { --brand-color: #ff6600; --neon-glow: 0 0 15px rgba(255, 102, 0, 0.4); }
        .print-wrapper { font-family: 'Inter', sans-serif; }
        .control-panel { background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(15px); padding: 35px; border-radius: var(--radius-lg); box-shadow: 0 10px 30px rgba(0,0,0,0.8), var(--neon-glow); max-width: 800px; margin: 40px auto; border: 1px solid rgba(255, 102, 0, 0.3); color: #fff; }
        .control-panel textarea { width: 100%; height: 120px; padding: 15px; border-radius: 8px; border: 1px solid rgba(255, 102, 0, 0.3); background: rgba(0,0,0,0.4); color: #fff; font-family: monospace; resize: vertical; margin-bottom: 25px; box-sizing: border-box; font-size: 16px; font-weight: bold; transition: all 0.3s; }
        .control-panel .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .control-panel .input-group { text-align: left; }
        .control-panel .input-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #ffaa00; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .control-panel .input-group input, .control-panel .input-group select { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid rgba(255, 102, 0, 0.3); background: rgba(0,0,0,0.4); color: #fff; box-sizing: border-box; font-family: 'Inter'; font-weight: 600; transition: all 0.3s; }
        .control-panel textarea:focus, .control-panel .input-group input:focus, .control-panel .input-group select:focus { border-color: #ffaa00; box-shadow: 0 0 10px rgba(255, 102, 0, 0.5); outline: none; }
        .control-panel #colorPicker { height: 50px; padding: 5px; cursor: pointer; background: transparent; border: none; }
        .control-panel .btn-print { background: linear-gradient(90deg, #ff6600, #e63900); color: white; border: none; padding: 18px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4); text-transform: uppercase; letter-spacing: 1px; }
        .control-panel .btn-print:hover { background: linear-gradient(90deg, #ffaa00, #ff6600); transform: scale(1.02); box-shadow: 0 6px 20px rgba(255, 102, 0, 0.7); }
        
        #print-area { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 0 auto; max-width: 21cm; }
        .v-card { background: white; width: 2.85cm; height: auto; border: 1.5px solid var(--brand-color); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; break-inside: avoid; page-break-inside: avoid; }
        .v-header { font-size: 0.5rem; font-weight: 900; text-align: center; color: black; padding: 3px 0; border-bottom: 1px solid var(--brand-color); text-transform: uppercase; }
        .v-creds { padding: 4px; display: flex; flex-direction: column; gap: 2px; }
        .v-row { display: flex; justify-content: center; align-items: center; margin: 2px 0; }
        .v-lbl { font-size: 0.45rem; font-weight: 700; color: #64748b; margin-right: 4px; }
        .v-val { font-size: 0.8rem; font-weight: 900; color: black; letter-spacing: 0.5px; }
        .v-price-box { background-color: var(--brand-color); color: white; text-align: center; padding: 4px 0; margin: 0 3px; border-radius: 4px; }
        .v-price { font-size: 0.75rem; font-weight: 900; }
        .v-time { font-size: 0.45rem; font-weight: 700; text-transform: uppercase; margin-top: 1px; }
        .v-footer { font-size: 0.45rem; font-weight: 900; text-align: center; color: black; padding: 3px 0; margin-top: auto; }
        
        /* Plantilla Premium */
        .v-card.premium { border: 2px solid #d4af37; background: linear-gradient(135deg, #fff, #fdfbf1); box-shadow: 0 2px 5px rgba(212,175,55,0.2); }
        .v-card.premium .v-header { border-bottom: 1px solid #d4af37; color: #d4af37; }
        .v-card.premium .v-price-box { background-color: #d4af37; color: #000; }
        
        /* Plantilla Oscura */
        .v-card.dark { background: #1e1e1e; border: 1.5px solid #444; color: #fff; }
        .v-card.dark .v-header { color: #fff; border-bottom: 1px solid #444; }
        .v-card.dark .v-lbl { color: #aaa; }
        .v-card.dark .v-val { color: var(--brand-color); }
        .v-card.dark .v-footer { color: #888; }
        
        @media print { 
            @page { margin: 10mm; } 
            body { padding: 0; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; } 
            .control-panel, .sidebar, .header, .bg-animation { display: none !important; } 
            .main-content { margin-left: 0 !important; padding: 0 !important; }
            #print-area { width: 100%; max-width: none; } 
        }

        /* PRO Modal Styles */
        .pro-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; display: inline-block; text-align: center; min-width: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .badge-green { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.5); text-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
        .badge-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.5); text-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
        .badge-orange { background: rgba(255, 102, 0, 0.15); color: #ffaa00; border: 1px solid rgba(255, 102, 0, 0.5); text-shadow: 0 0 8px rgba(255, 102, 0, 0.5); }
        
        .pro-progress-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; width: 100%; margin-top: 6px; overflow: hidden; position: relative; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .pro-progress-fill { background: linear-gradient(90deg, #10b981, #ef4444); height: 100%; border-radius: 3px; transition: width 0.5s ease-out; }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(255, 102, 0, 0.4); border-color: rgba(255, 102, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 102, 0, 0.9); border-color: #ffaa00; }
            100% { box-shadow: 0 0 10px rgba(255, 102, 0, 0.4); border-color: rgba(255, 102, 0, 0.5); }
        }
        .master-total-box { animation: pulse-glow 2.5s infinite; background: linear-gradient(135deg, rgba(20,20,25,0.95), rgba(40,15,5,0.95)); backdrop-filter: blur(10px); padding: 20px 25px; border-radius: 16px; margin-top: 25px; display: flex; justify-content: space-between; align-items: center; border: 2px solid #ff6600; position: relative; overflow: hidden; }
        .master-total-box::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,102,0,0.1) 0%, transparent 60%); z-index: 0; pointer-events: none; }
        .master-total-content { position: relative; z-index: 1; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-modal-action { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 0.9rem; font-family: 'Inter'; font-weight: 600; }
        .btn-modal-action:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); border-color: #ffaa00; color: #ffaa00; }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
    </div>

    {% include 'sidebar.html' %}

    <main class="main-content">
        <div class="print-wrapper">
            <div class="control-panel">
                <div class="panel-header" style="margin-bottom: 20px; text-align: center;">
                    <h2 style="color: #fff; margin-top: 0; text-shadow: 0 0 10px rgba(255,102,0,0.5);"><i class="fas fa-paint-brush" style="color: var(--brand-color);"></i> CuzoNet Omada Print Studio</h2>
                    <p style="color: #aaaaaa; font-size: 0.95rem;">Pega los códigos generados en tu controlador Omada para imprimirlos con este diseño.</p>
                </div>
                <div style="background: rgba(255, 102, 0, 0.05); border: 1px solid rgba(255, 102, 0, 0.3); padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: inset 0 0 15px rgba(255, 102, 0, 0.1);">
                    <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-bottom: 10px;">
                        <div class="input-group" style="flex: 1; min-width: 200px;">
                            <label><i class="fas fa-wifi"></i> Controlador Omada</label>
                            <select id="genOmada" onchange="cargarSitiosPrint()">
                                {% for om in omadas %}
                                <option value="{{ om.id }}" data-default-site="{{ om.site_id }}">{{ om.nombre }} ({{ om.site_id }})</option>
                                {% else %}
                                <option value="">No hay Omadas configurados</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="input-group" style="flex: 1; min-width: 200px;">
                            <label><i class="fas fa-sitemap"></i> Seleccionar Sitio</label>
                            <select id="genOmadaSite">
                                <option value="">-- Automático (Sitio por Defecto) --</option>
                            </select>
                        </div>
                    </div>
                    <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-bottom: 10px;">
                        <div class="input-group" style="flex: 1;">
                            <label><i class="fas fa-ticket-alt"></i> Cantidad de Fichas</label>
                            <input type="number" id="genAmount" value="50" min="1" max="500">
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label><i class="fas fa-clock"></i> Tiempo (Valor)</label>
                            <input type="number" id="genTimeVal" value="3" min="1">
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Unidad de Tiempo</label>
                            <select id="genTimeUnidad">
                                <option value="0">Minutos</option>
                                <option value="1" selected>Horas</option>
                                <option value="2">Días</option>
                            </select>
                        </div>
                    </div>
                    <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                        <div class="input-group" style="flex: 1;">
                            <label><i class="fas fa-user-tag"></i> Vendedor Asignado</label>
                            <div style="display: flex; gap: 10px;">
                                <select id="genVendedor" style="flex: 1;">
                                    <option value="">-- Seleccionar Vendedor --</option>
                                    {% for v in vendedores %}
                                    <option value="{{ v.id }}">{{ v.nombre }}</option>
                                    {% endfor %}
                                </select>
                                <button type="button" class="btn-print" style="width: auto; padding: 12px; background: rgba(20,20,25,0.8); border: 1px solid #ff6600;" onclick="abrirStatsVendedores()" title="Ver Estadísticas por Vendedor">
                                    <i class="fas fa-chart-pie" style="color: #ffaa00;"></i>
                                </button>
                            </div>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label><i class="fas fa-money-bill-wave"></i> Precio Unitario (Q)</label>
                            <input type="number" id="genPrecio" value="3.00" step="0.50" min="0">
                        </div>
                        <button type="button" class="btn-print" id="btnAutoGenerate" style="flex: 1; padding: 12px; margin-top: 24px;" onclick="autoGenerateVouchers()">
                            GENERAR CON API <i class="fas fa-bolt"></i>
                        </button>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 15px; position: relative;">
                    <label>Códigos Generados / Pegar Manualmente</label>
                    <textarea id="codesInput" placeholder="Los códigos de la API aparecerán aquí... o puedes pegarlos manualmente"></textarea>
                </div>
                <div class="inputs-grid">
                    <div class="input-group"><label>Nombre del Negocio</label><input type="text" id="businessName" value="CUZONET"></div>
                    <div class="input-group">
                        <label>Plantilla</label>
                        <select id="templateSelector">
                            <option value="classic">Clásica</option>
                            <option value="premium">Premium (Oro)</option>
                            <option value="dark">Oscura / Neon</option>
                        </select>
                    </div>
                    <div class="input-group"><label>Color de la Marca</label><input type="color" id="colorPicker" value="#ff6600" oninput="updateColor(this.value)"></div>
                    <div class="input-group"><label>Duración</label><input type="text" id="timeInput" value="3 HORAS"></div>
                    <div class="input-group"><label>Precio</label><input type="text" id="priceInput" value="Q 3.00"></div>
                </div>
                <div style="display: flex; gap: 15px;">
                    <button class="btn-print" onclick="iniciarProceso(false)">IMPRIMIR FICHAS <i class="fas fa-print" style="margin-left: 8px;"></i></button>
                    <button class="btn-print" style="background-color: #e63946;" onclick="iniciarProceso(true)">EXPORTAR A PDF <i class="fas fa-file-pdf" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            <div id="print-area"></div>
        </div>
    </main>

    <!-- Modal Estadísticas de Vendedores -->
    <div class="modal-overlay" id="statsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div class="modal-content" style="background: rgba(20, 20, 25, 0.95); border: 1px solid #ff6600; border-radius: 12px; padding: 30px; width: 800px; max-width: 95%; color: #fff; box-shadow: 0 0 30px rgba(255, 102, 0, 0.3);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,102,0,0.3); padding-bottom: 10px;">
                <h3 style="margin: 0; color: #ffaa00;"><i class="fas fa-chart-pie"></i> Estadísticas por Plan / Lote</h3>
                <div>
                    <button id="btnSyncOmada" class="btn-modal-action" onclick="sincronizarOmada()" style="margin-right: 15px; border-color: #03a786; color: #03a786;"><i class="fas fa-sync-alt"></i> Sincronizar Omada</button>
                    <button class="btn-modal-action" onclick="imprimirStats()" style="margin-right: 15px;"><i class="fas fa-print"></i> Imprimir Reporte</button>
                    <button onclick="document.getElementById('statsModal').style.display='none'" class="close-btn" style="background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer;">&times;</button>
                </div>
            </div>
            <div id="statsContent" style="min-height: 150px;">
                <div style="text-align: center; margin-top: 50px;"><i class="fas fa-spinner fa-spin fa-2x text-warning"></i></div>
            </div>
        </div>
    </div>

    <script>
        async function cargarSitiosPrint() {
            const omadaSelect = document.getElementById('genOmada');
            const siteSelect = document.getElementById('genOmadaSite');
            const omada_id = omadaSelect.value;
            
            siteSelect.innerHTML = '<option value="">-- Automático (Sitio por Defecto) --</option>';
            if (!omada_id) return;
            
            // Mostrar estado de carga
            siteSelect.innerHTML = '<option value="">Cargando sitios...</option>';
            siteSelect.disabled = true;
            
            try {
                const r = await fetch('/api/omada/' + omada_id + '/sites');
                const res = await r.json();
                
                siteSelect.innerHTML = '<option value="">-- Automático (Sitio por Defecto) --</option>';
                if (res.success && res.sites.length > 0) {
                    const defaultSite = omadaSelect.options[omadaSelect.selectedIndex].getAttribute('data-default-site');
                    res.sites.forEach(site => {
                        const opt = document.createElement('option');
                        opt.value = site.name;
                        opt.textContent = `${site.name} (ID: ${site.id})`;
                        if (site.name === defaultSite) opt.selected = true;
                        siteSelect.appendChild(opt);
                    });
                } else if (res.error) {
                    typeof showToast !== 'undefined' ? showToast(res.error, 'error') : console.error(res.error);
                }
            } catch (e) {
                siteSelect.innerHTML = '<option value="">-- Error al cargar --</option>';
            } finally {
                siteSelect.disabled = false;
            }
        }
        
        // Cargar sitios al iniciar la página si ya hay un Omada seleccionado
        document.addEventListener('DOMContentLoaded', () => {
            if (document.getElementById('genOmada').value) {
                cargarSitiosPrint();
            }
        });

        async function autoGenerateVouchers() {
            const btn = document.getElementById('btnAutoGenerate');
            const oldHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generando en Omada...';
            btn.disabled = true;
            
            try {
                const omada_id = document.getElementById('genOmada').value;
                if(!omada_id) {
                    typeof showToast !== 'undefined' ? showToast('Debes configurar y seleccionar un Controlador Omada', 'error') : alert('Falta Omada');
                    return;
                }
                const cantidad = document.getElementById('genAmount').value;
                const tiempo = document.getElementById('genTimeVal').value;
                const unidad = document.getElementById('genTimeUnidad').value;
                const vendedor_id = document.getElementById('genVendedor').value;
                if(!vendedor_id) {
                    typeof showToast !== 'undefined' ? showToast('DEBES seleccionar a un Vendedor responsable.', 'error') : alert('Debes seleccionar a un Vendedor');
                    btn.innerHTML = oldHtml;
                    btn.disabled = false;
                    return;
                }
                const precio = document.getElementById('genPrecio').value;
                const site_name = document.getElementById('genOmadaSite').value;
                
                const r = await fetch('/api/omada/generar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ omada_id, site_name, cantidad, tiempo, unidad, vendedor_id, precio })
                });
                const res = await r.json();
                
                if(res.success && res.pines) {
                    typeof showToast !== 'undefined' ? showToast(`¡Se generaron ${res.pines.length} fichas con éxito!`, 'success') : null;
                    document.getElementById('codesInput').value = res.pines.join('\n');
                    
                    // Llenar datos visuales
                    const tText = unidad == 0 ? 'MINUTOS' : (unidad == 1 ? 'HORAS' : 'DIAS');
                    document.getElementById('timeInput').value = `${tiempo} ${tText}`;
                    
                    // Iniciar renderizado automáticamente
                    setTimeout(() => iniciarProceso(false), 500);
                } else {
                    typeof showToast !== 'undefined' ? showToast(res.error || 'Error al generar', 'error') : alert(res.error);
                }
            } catch(e) {
                typeof showToast !== 'undefined' ? showToast('Error de red al conectar con el servidor', 'error') : alert('Error de red');
            } finally {
                btn.innerHTML = oldHtml;
                btn.disabled = false;
            }
        }

        async function sincronizarOmada() {
            const btn = document.getElementById('btnSyncOmada');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sincronizando...';
            btn.disabled = true;
            
            try {
                const r = await fetch('/api/omada/sync', { method: 'POST' });
                const res = await r.json();
                if (res.success) {
                    showToast(res.message, 'success');
                    // Reload stats
                    abrirStatsVendedores();
                } else {
                    showToast(res.error || 'Error al sincronizar', 'error');
                }
            } catch (e) {
                showToast('Error de red al sincronizar', 'error');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        async function abrirStatsVendedores() {
            document.getElementById('statsModal').style.display = 'flex';
            const content = document.getElementById('statsContent');
            content.innerHTML = '<div style="text-align: center; margin-top: 50px; color:#ffaa00;"><i class="fas fa-spinner fa-spin fa-2x"></i><br>Cargando datos...</div>';
            
            try {
                const r = await fetch('/api/omada/stats_vendedores');
                const res = await r.json();
                
                if (res.success) {
                    if (Object.keys(res.stats).length === 0) {
                        content.innerHTML = '<p style="text-align:center; color:#aaa; margin-top: 20px;">No hay fichas generadas todavía.</p>';
                        return;
                    }
                    
                    let html = '<div style="max-height: 400px; overflow-y: auto; padding-right: 10px;">';
                    
                    let granTotalFichas = 0;
                    let granTotalDinero = 0;
                    
                    for (const [vendedor, lotes] of Object.entries(res.stats)) {
                        html += `<h4 style="color: #fff; margin-top: 15px; margin-bottom: 5px; border-bottom: 1px solid rgba(255,102,0,0.5); padding-bottom: 5px;"><i class="fas fa-user-tie" style="color:#ffaa00;"></i> ${vendedor}</h4>`;
                        html += '<table style="width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 0.9rem;">';
                        html += '<tr style="color: #ffaa00; text-align: left; background: rgba(255,255,255,0.05);">';
                        html += '<th style="padding: 8px;">Plan / Lote</th><th style="padding: 8px; text-align:center;">Disponibles</th><th style="padding: 8px; text-align:center;">Vendidas</th><th style="padding: 8px; text-align:center;">Total Generadas</th><th style="padding: 8px; text-align:right;">Deuda Total (Q)</th></tr>';
                        
                        let subFichas = 0;
                        let subDinero = 0;
                        
                        lotes.forEach(l => {
                            let totalFichas = l.total_fichas || 1; // avoid div by 0
                            let pctVendidas = (l.vendidas / totalFichas) * 100;
                            
                            html += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                                <td style="padding: 8px; color: #ccc;">${l.plan}</td>
                                <td style="padding: 8px; text-align:center;">
                                    <span class="pro-badge badge-green">${l.disponibles}</span>
                                </td>
                                <td style="padding: 8px; text-align:center;">
                                    <span class="pro-badge badge-red">${l.vendidas}</span>
                                </td>
                                <td style="padding: 8px; text-align:center; font-weight:bold;">
                                    ${l.total_fichas}
                                    <div class="pro-progress-bg">
                                        <div class="pro-progress-fill" style="width: ${pctVendidas}%"></div>
                                    </div>
                                </td>
                                <td style="padding: 8px; text-align:right; color:#ffaa00; font-weight:bold;">Q ${l.total_dinero.toFixed(2)}</td>
                            </tr>`;
                            subFichas += l.total_fichas;
                            subDinero += l.total_dinero;
                        });
                        
                        html += `<tr style="background: rgba(255,102,0,0.1);">
                            <td style="padding: 8px; font-weight:bold; color:#fff;">Subtotal ${vendedor.split(' ')[0]}</td>
                            <td colspan="2"></td>
                            <td style="padding: 8px; text-align:center; font-weight:bold; color:#fff;">${subFichas}</td>
                            <td style="padding: 8px; text-align:right; font-weight:bold; color:#ffaa00;">Q ${subDinero.toFixed(2)}</td>
                        </tr>`;
                        html += '</table>';
                        
                        granTotalFichas += subFichas;
                        granTotalDinero += subDinero;
                    }
                    
                    html += `<div class="master-total-box">
                        <div class="master-total-content">
                            <span style="font-weight:900; font-size: 1.2rem; color:#fff; letter-spacing: 1px;"><i class="fas fa-coins" style="color:#ffaa00; margin-right:8px;"></i>TOTAL GENERAL MASTER</span>
                            <div style="text-align: right;">
                                <span style="display: block; font-size: 0.95rem; color: #ccc;">Fichas Totales: <b>${granTotalFichas}</b></span>
                                <span style="font-weight:900; font-size: 1.5rem; color:#ffaa00; text-shadow: 0 0 10px rgba(255,170,0,0.5);">Q ${granTotalDinero.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>`;
                    
                    html += '</div>';
                    content.innerHTML = html;
                } else {
                    content.innerHTML = `<div style="color: #e63946; text-align: center;">Error: ${res.error}</div>`;
                }
            } catch (e) {
                content.innerHTML = '<div style="color: #e63946; text-align: center;">Error de red al obtener estadísticas.</div>';
            }
        }

        function updateColor(color) { document.documentElement.style.setProperty('--brand-color', color); }
        
        function imprimirStats() {
            window.print();
        }

        function iniciarProceso(exportPDF = false) {
            let textoFresco = document.getElementById('codesInput').value;
            const businessName = document.getElementById('businessName').value || 'WIFI';
            const templateStr = document.getElementById('templateSelector').value;
            const timeStr = document.getElementById('timeInput').value || '-';
            const priceStr = document.getElementById('priceInput').value || '-';
            const printArea = document.getElementById('print-area');
            
            // 1. LIMPIEZA INICIAL DE TEXTO
            // Ya no concatenamos saltos de línea porque estaba uniendo los días ("11") con el PIN ("738889")
            // textoFresco = textoFresco.replace(/(\d+)\s*\n\s*(\d+)/g, '$1$2');
            
            // 2. EXTRACCIÓN Y LIMPIEZA
            const encontradosFrescos = textoFresco.match(/\d{6,12}/g); // PINs de al menos 6 dígitos para ignorar años (2026)
            if(!encontradosFrescos || encontradosFrescos.length === 0) { 
                typeof showToast !== 'undefined' ? showToast("Por favor, pega los códigos de Omada.", "warning") : alert("Por favor, pega los códigos.");
                return; 
            }
            const pingsFinales = [...new Set(encontradosFrescos)];

            // 3. NOMBRE DE ARCHIVO DINÁMICO (Seguro)
            document.title = `Vouchers_${businessName.replace(/\s+/g, '_')}_${priceStr}_${timeStr}_${pingsFinales.length}`.replace(/[\/\?%*:|"<>\.\s]/g, '-');

            // 4. RENDERIZADO
            printArea.innerHTML = '';
            pingsFinales.forEach((code, index) => {
                const card = document.createElement('div');
                card.className = `v-card ${templateStr}`;
                card.innerHTML = `
                    <div class="v-header"><i class="fas fa-wifi" style="margin-right:3px; font-size:0.4rem;"></i> ${businessName}</div>
                    <div class="v-creds"><div class="v-row"><span class="v-lbl">PIN:</span><span class="v-val">${code}</span></div></div>
                    <div class="v-price-box"><div class="v-price">${priceStr}</div><div class="v-time">DURACIÓN: ${timeStr}</div></div>
                    <div class="v-footer">Ficha: #${index + 1}</div>
                `;
                printArea.appendChild(card);
            });
            
            if (exportPDF) {
                typeof showToast !== 'undefined' ? showToast("Generando PDF... por favor espera.", "info") : null;
                const opt = {
                    margin:       10,
                    filename:     document.title + '.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2 },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(printArea).save();
            } else {
                setTimeout(() => { window.print(); }, 500);
            }
        }
    </script>
</body>
</html>
