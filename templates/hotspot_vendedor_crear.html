<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Vendedor - CuzoNet Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .pro-form-container {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 32px;
            max-width: 900px;
            margin: 0 auto;
        }
        .pro-header {
            background: var(--gradient-primary);
            padding: 24px 32px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            margin: -32px -32px 32px -32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pro-header h2 { margin: 0; color: white; font-size: 1.4rem; }
    </style>
</head>

<body>
    <!-- Fondo animado -->
    <div class="bg-animation">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
        <div class="floating-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
        </div>
    </div>

    {% include 'sidebar.html' %}

    <main class="main-content">
        <div class="pro-form-container">
            <div class="pro-header">
                <h2><i class="fas fa-user-plus"></i> Crear Vendedor</h2>
                <a href="/admin/hotspot/vendedores" class="btn btn-secondary" style="border: rgba(255,255,255,0.2) 1px solid; background: rgba(0,0,0,0.3); color: white;">
                    <i class="fas fa-arrow-left"></i> Volver a Lista
                </a>
            </div>
            
            <form action="/admin/hotspot/vendedor/guardar" method="POST">
                <input type="hidden" name="vendedor_id" id="vendedor_id">
                
                <div class="form-row">
                    <div class="form-group full">
                        <label>Tipo de Vendedor</label>
                        <select class="form-control" name="tipo_vendedor" style="background: var(--bg-tertiary);">
                            <option value="acumulativo">Acumulativo (Comisión Postpago)</option>
                            <option value="prepago">Prepago (Saldo Anticipado)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full">
                        <label>Nombre Vendedor / Negocio</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Tienda Maria" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Usuario (Teléfono)</label>
                        <input type="text" name="username" class="form-control" placeholder="Usuario para Iniciar Sesión" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="Clave de Acceso" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full">
                        <label>Asignar a TPV / Router MikroTik</label>
                        <select name="router_id" class="form-control">
                            <option value="">Ninguno (Vendedor Global o Sin Asignar)</option>
                            {% for r in routers %}
                                <option value="{{ r.id }}">{{ r.nombre }} ({{ r.host }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-row" style="margin-top: 32px;">
                    <div class="form-group full" style="display: flex; justify-content: center;">
                        <button type="submit" class="btn btn-success" style="padding: 14px 40px; font-size: 1.1rem; background: var(--gradient-success); border-radius: 50px;">
                            <i class="fas fa-save"></i> Generar Vendedor
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
