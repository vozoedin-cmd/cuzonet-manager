<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imprimir Lote - {{ lote.nombre }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-base: #0f1219;
            --bg-panel: rgba(22, 27, 34, 0.6);
            --brand-color: #0ea5e9;
            --brand-glow: rgba(14, 165, 233, 0.4);
            --text-main: #f0f6fc;
            --border-light: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(0, 0, 0, 0.3);
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-main);
            margin: 0; 
            padding: 40px 20px; 
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.15), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.1), transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Glassmorphic Control Panel */
        .control-panel { 
            background: var(--bg-panel); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1); 
            max-width: 900px; 
            margin: 0 auto 50px auto; 
            border: 1px solid var(--border-light); 
        }

        .panel-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .panel-header h2 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .inputs-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        
        .input-group label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: #94a3b8; 
            margin-bottom: 8px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-group input, .input-group select { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 10px; 
            border: 1px solid var(--border-light); 
            background: var(--input-bg);
            color: white;
            box-sizing: border-box; 
            font-family: 'Inter'; 
            font-weight: 600; 
            transition: all 0.3s;
        }
        
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--brand-color);
            box-shadow: 0 0 15px var(--brand-glow);
        }
        
        #colorPicker { height: 45px; padding: 5px; cursor: pointer; }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn { 
            flex: 1;
            background: linear-gradient(135deg, var(--brand-color), #2563eb); 
            color: white; 
            border: none; 
            padding: 16px; 
            font-size: 1.1rem; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 800; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 4px 15px var(--brand-glow); 
            display: flex; justify-content: center; align-items: center; gap: 10px; 
        }
        
        .btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 25px var(--brand-glow); 
        }
        
        .btn-secondary { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border-light);
            box-shadow: none;
            color: var(--text-main);
            text-decoration: none;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        /* Contenedor de impresión con Canvas oscuro */
        #print-area { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            justify-content: center; 
            margin: 0 auto; 
            max-width: 21cm; 
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            border: 1px solid var(--border-light);
        }
        
        /* Estilo Ticket en Vista Previa */
        .v-card { 
            background: white; 
            width: 4.5cm; 
            height: auto; 
            border: 2px solid var(--brand-color); 
            border-radius: 8px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            break-inside: avoid; 
            page-break-inside: avoid; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        
        .v-card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 20px var(--brand-glow);
        }
        
        .v-header { 
            font-size: 0.8rem; 
            font-weight: 900; 
            text-align: center; 
            color: white; 
            background: var(--brand-color);
            padding: 5px 0; 
            text-transform: uppercase; 
        }
        
        .v-body {
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .qr-container {
            margin: 5px 0;
            padding: 5px;
            background: white;
            border-radius: 4px;
        }
        
        .qr-container img {
            width: 100px;
            height: 100px;
            display: block;
        }

        .v-creds { padding: 4px; display: flex; flex-direction: column; align-items: center; gap: 2px; border-bottom: 1px dashed #cbd5e1; width: 100%; margin-bottom: 5px; }
        .v-lbl { font-size: 0.55rem; font-weight: 700; color: #64748b; margin-right: 4px; text-transform: uppercase; }
        .v-val { font-size: 1.1rem; font-weight: 900; color: black; letter-spacing: 1px; }
        
        .v-price-box { 
            width: 100%;
            text-align: center; 
            margin: 2px 0; 
        }
        .v-price { font-size: 1rem; font-weight: 900; color: var(--brand-color); }
        .v-time { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: #475569; }
        
        .v-footer { 
            font-size: 0.5rem; 
            font-weight: 700; 
            text-align: center; 
            color: #64748b; 
            padding: 5px; 
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        /* Ocultar elementos en impresión y quitar estilos oscuros */
        @media print { 
            @page { margin: 5mm; } 
            body { padding: 0; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; } 
            .control-panel { display: none; } 
            #print-area { width: 100%; max-width: none; gap: 5px; background: none; border: none; padding: 0; } 
            .v-card { box-shadow: none; transform: none; }
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="panel-header">
            <h2>🖨️ CuzoNet Print Studio (Pro)</h2>
            <p style="color: #64748b;">Lote: {{ lote.nombre }} | Fichas: {{ vouchers|length }}</p>
        </div>
        
        <div class="inputs-grid">
            <div class="input-group">
                <label>Nombre del Negocio:</label>
                <input type="text" id="businessName" value="WIFI PREMIUM" oninput="updatePreview()">
            </div>
            <div class="input-group">
                <label>Color del Ticket:</label>
                <input type="color" id="colorPicker" value="#0ea5e9" oninput="updateColor(this.value)">
            </div>
            <div class="input-group">
                <label>Tamaño de Impresión:</label>
                <select id="printSize" onchange="updateSize(this.value)">
                    <option value="4.5cm">Térmica 58mm</option>
                    <option value="6.5cm">Térmica 80mm</option>
                    <option value="8cm">Hoja A4 (Rejilla)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Duración del Plan:</label>
                <input type="text" id="timeInput" value="{{ lote.plan.nombre }}" oninput="updatePreview()">
            </div>
            <div class="input-group">
                <label>Precio Mostrado:</label>
                <input type="text" id="priceInput" value="Q. {{ '%.2f'|format(lote.plan.precio) }}" oninput="updatePreview()">
            </div>
            <div class="input-group">
                <label>Mostrar Código QR:</label>
                <select id="showQR" onchange="updatePreview()">
                    <option value="yes">Sí, generar conexión automática</option>
                    <option value="no">No, solo mostrar PIN</option>
                </select>
            </div>
        </div>
        
        <div class="btn-group">
            <a href="/admin/hotspot/lotes" class="btn btn-secondary">← Volver</a>
            <button class="btn" onclick="window.print()">🖨️ IMPRIMIR LOTES (CTRL + P)</button>
        </div>
    </div>

    <!-- Data Injection -->
    <script>
        const baseUrl = "{{ url_login }}";
        const vouchersData = [
            {% for v in vouchers %}
                {
                    codigo: "{{ v.codigo }}",
                    password: "{{ v.contrasena }}",
                    id: {{ loop.index }}
                }{% if not loop.last %},{% endif %}
            {% endfor %}
        ];
    </script>

    <div id="print-area"></div>

    <script>
        function updateColor(color) { 
            document.documentElement.style.setProperty('--brand-color', color); 
        }
        
        function updateSize(size) {
            const cards = document.querySelectorAll('.v-card');
            cards.forEach(card => card.style.width = size);
        }

        function updatePreview() {
            const businessName = document.getElementById('businessName').value || 'WIFI';
            const timeStr = document.getElementById('timeInput').value || '-';
            const priceStr = document.getElementById('priceInput').value || '-';
            const showQR = document.getElementById('showQR').value === 'yes';
            const printArea = document.getElementById('print-area');
            
            printArea.innerHTML = ''; // Limpiar
            
            vouchersData.forEach((v, index) => {
                const card = document.createElement('div');
                card.className = 'v-card';
                
                // Construir URL del QR
                const qrUrl = `${baseUrl}?username=${encodeURIComponent(v.codigo)}&password=${encodeURIComponent(v.password)}`;
                
                // HTML Base del ticket
                let innerHTML = `
                    <div class="v-header">${businessName}</div>
                    <div class="v-body">
                `;
                
                // Añadir QR si está habilitado
                if (showQR) {
                    innerHTML += `<div class="qr-container" id="qr-${index}"></div>`;
                }
                
                // Credenciales y Precio
                innerHTML += `
                        <div class="v-creds">
                            <div><span class="v-lbl">Usuario/PIN:</span></div>
                            <div class="v-val">${v.codigo}</div>
                        </div>
                        <div class="v-price-box">
                            <div class="v-time">${timeStr}</div>
                            <div class="v-price">${priceStr}</div>
                        </div>
                    </div>
                    <div class="v-footer">Ficha #${v.id} | Powered by CuzoNet</div>
                `;
                
                card.innerHTML = innerHTML;
                printArea.appendChild(card);
                
                // Generar QR en el contenedor si está habilitado
                if (showQR) {
                    new QRCode(document.getElementById(`qr-${index}`), {
                        text: qrUrl,
                        width: 90,
                        height: 90,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.L
                    });
                }
            });
            
            // Actualizar tamaño base
            updateSize(document.getElementById('printSize').value);
        }

        // Render inicial
        window.onload = function() {
            updatePreview();
        };
    </script>
</body>
</html>
